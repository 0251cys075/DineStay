{% extends "base.html" %}
{% block title %}{{ action }} Event{% endblock %}
{% block page_title %}{{ action }} Event{% endblock %}
{% block content %}
<div class="section-header">
  <div>
    <h2 class="section-title">📅 {{ action }} Location Event</h2>
    <p class="text-muted mt-2">Destination: <strong>{{ location.name }}</strong> ({{ location.city }})</p>
  </div>
  <a href="{{ url_for('explore_detail', loc_id=location.location_id) }}" class="btn btn-ghost">← Back to Details</a>
</div>

<div class="card" style="max-width:600px">
  <form method="POST">
    <div class="form-grid">
      <!-- Title -->
      <div class="form-group" style="grid-column: 1/-1">
        <label class="form-label">Event Title</label>
        <input class="form-control" type="text" name="title" required
               value="{{ event.title if event else '' }}" placeholder="e.g. Traditional Puppet Show"/>
      </div>
      
      <!-- Date -->
      <div class="form-group">
        <label class="form-label">Date</label>
        <input class="form-control" type="date" name="date" required
               value="{{ event.date if event else '' }}"/>
      </div>

      <!-- Time -->
      <div class="form-group">
        <label class="form-label">Time</label>
        <input class="form-control" type="time" name="time"
               value="{{ event.time if event else '' }}"/>
      </div>

      <!-- Venue -->
      <div class="form-group" style="grid-column: 1/-1">
        <label class="form-label">Venue / Room</label>
        <input class="form-control" type="text" name="venue" required
               value="{{ event.venue if event else '' }}" placeholder="e.g. Palace Central Courtyard"/>
      </div>

      <!-- Description -->
      <div class="form-group" style="grid-column: 1/-1">
        <label class="form-label">Event Description</label>
        <textarea class="form-control" name="description" rows="4" placeholder="Describe the event details, activities, tickets, or guest listings..." style="resize:vertical;">{{ event.description if event else '' }}</textarea>
      </div>
    </div>

    <!-- Actions -->
    <div class="flex gap-3 mt-6">
      <button type="submit" class="btn btn-primary">{{ action }} Event</button>
      <a href="{{ url_for('explore_detail', loc_id=location.location_id) }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
