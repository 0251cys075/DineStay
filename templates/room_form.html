{% extends "base.html" %}
{% block title %}Add Room{% endblock %}
{% block page_title %}Add Room{% endblock %}
{% block content %}
<div class="section-header">
  <h2 class="section-title">➕ Add New Room</h2>
  <a href="{{ url_for('rooms') }}" class="btn btn-ghost">← Back</a>
</div>
<div class="card" style="max-width:500px">
  <form method="POST">
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Room Type</label>
        <select class="form-control" name="room_type" required>
          <option value="Deluxe">🌟 Deluxe</option>
          <option value="Standard">🛏 Standard</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Room Number</label>
        <input class="form-control" type="text" name="room_number" required placeholder="e.g. 301"/>
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label">Price Per Night (₹)</label>
        <input class="form-control" type="number" name="room_price" required min="1" step="0.01" placeholder="e.g. 3500"/>
      </div>
    </div>
    <div class="flex gap-3 mt-6">
      <button type="submit" class="btn btn-primary">Add Room</button>
      <a href="{{ url_for('rooms') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
