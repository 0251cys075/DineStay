{% extends "base.html" %}
{% block title %}{{ 'Edit' if emp else 'Add' }} Employee{% endblock %}
{% block page_title %}{{ 'Edit' if emp else 'Add' }} Employee{% endblock %}
{% block content %}
<div class="section-header">
  <h2 class="section-title">{{ '✏️ Edit' if emp else '➕ Add' }} Employee</h2>
  <a href="{{ url_for('employees') }}" class="btn btn-ghost">← Back</a>
</div>
<div class="card" style="max-width:560px">
  <form method="POST">
    <div class="form-grid">
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label">Full Name</label>
        <input class="form-control" type="text" name="name" required
               value="{{ emp.name if emp else '' }}" placeholder="e.g. Suresh Kumar"/>
      </div>
      <div class="form-group">
        <label class="form-label">Designation</label>
        <input class="form-control" type="text" name="designation"
               value="{{ emp.designation if emp else '' }}" placeholder="e.g. Chef"/>
      </div>
      <div class="form-group">
        <label class="form-label">Department</label>
        <input class="form-control" type="text" name="department"
               value="{{ emp.department if emp else '' }}" placeholder="e.g. Kitchen"/>
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label">Salary (₹)</label>
        <input class="form-control" type="number" name="salary" min="0" step="0.01"
               value="{{ emp.salary if emp else '' }}" placeholder="e.g. 45000"/>
      </div>
    </div>
    <div class="flex gap-3 mt-6">
      <button type="submit" class="btn btn-primary">{{ 'Update Employee' if emp else 'Add Employee' }}</button>
      <a href="{{ url_for('employees') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
