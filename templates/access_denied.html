<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Access Denied — DineStay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#0d0f1a;color:#e8eaf6;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .box{background:#141726;border:1px solid #252a45;border-radius:18px;padding:48px 44px;max-width:440px;width:100%;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.5)}
    .icon{font-size:4rem;margin-bottom:16px;display:block}
    h1{font-size:1.6rem;font-weight:800;margin-bottom:10px;color:#ff6584}
    p{color:#8892b0;font-size:.9rem;line-height:1.6;margin-bottom:28px}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:11px 22px;border-radius:9px;text-decoration:none;font-weight:700;font-size:.9rem;transition:all .2s}
    .btn-primary{background:linear-gradient(135deg,#6c63ff,#a78bfa);color:#fff;margin-right:8px}
    .btn-ghost{background:rgba(255,255,255,.06);color:#e8eaf6;border:1px solid #252a45}
    .btn:hover{opacity:.9;transform:translateY(-1px)}
  </style>
</head>
<body>
  <div class="box">
    <span class="icon">🚫</span>
    <h1>Access Denied</h1>
    <p>This feature is for <strong>Admin only</strong>.<br/>
    You are logged in as a regular user with view-only access.<br/>
    Please contact the administrator if you need edit access.</p>
    <a href="{{ url_for('dashboard') }}" class="btn btn-primary">🏠 Go to Dashboard</a>
    <a href="{{ url_for('logout') }}" class="btn btn-ghost">🚪 Logout</a>
  </div>
</body>
</html>
