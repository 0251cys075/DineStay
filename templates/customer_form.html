{% extends "base.html" %}
{% block title %}{{ action }} Customer{% endblock %}
{% block page_title %}{{ action }} Customer{% endblock %}
{% block content %}
<div class="section-header">
  <h2 class="section-title">{{ '➕' if action == 'Add' else '✏️' }} {{ action }} Customer</h2>
  <a href="{{ url_for('customers') }}" class="btn btn-ghost">← Back</a>
</div>
<div class="card" style="max-width:560px">
  <form method="POST">
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input class="form-control" type="text" name="name" required
               value="{{ customer.name if customer else '' }}" placeholder="e.g. Arjun Sharma"/>
      </div>
      <div class="form-group">
        <label class="form-label">Phone</label>
        <input class="form-control" type="text" name="phone"
               value="{{ customer.phone if customer else '' }}" placeholder="+91-9876543210"/>
      </div>
      <div class="form-group" style="grid-column: 1/-1">
        <label class="form-label">Email</label>
        <input class="form-control" type="email" name="email"
               value="{{ customer.email if customer else '' }}" placeholder="user@email.com"/>
      </div>
    </div>
    <div class="flex gap-3 mt-6">
      <button type="submit" class="btn btn-primary">{{ action }} Customer</button>
      <a href="{{ url_for('customers') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
